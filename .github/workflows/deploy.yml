name: Build, Push & Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build Docker image and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: eduardosepassos/my-portfolio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull eduardosepassos/my-portfolio:latest
            docker stop my-portfolio 2>/dev/null || true
            docker rm   my-portfolio 2>/dev/null || true
            docker run -d \
              --name my-portfolio \
              --restart unless-stopped \
              -p 80:80 \
              eduardosepassos/my-portfolio:latest
